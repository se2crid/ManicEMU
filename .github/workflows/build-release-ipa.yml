name: Build Release IPA

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    env:
      UPLOAD_IPA: ${{ vars.UPLOAD_IPA || 'true' }}

    steps:
      - name: 1. Fetch Source Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: 2. Restore Oversized Vendored Core
        run: |
          cat Cores/mame.libretro.framework/mame.libretro.part.* \
            > Cores/mame.libretro.framework/mame.libretro
          echo "ede8b95b25fe4351d3e8b8ecc1398e589459d84b68650dfbda535c54f697638b  Cores/mame.libretro.framework/mame.libretro" \
            | shasum -a 256 -c -
          chmod +x Cores/mame.libretro.framework/mame.libretro

      - name: 3. Configure Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: 4. Compile Project Archive
        run: |
          xcodebuild clean archive \
            -project ManicEmu/ManicEmu.xcodeproj \
            -scheme "ManicEmuRelease" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ManicEmuRelease.xcarchive" \
            -destination "generic/platform=iOS" \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 5. Package .app into .ipa
        env:
          APP_PATH: ${{ runner.temp }}/ManicEmuRelease.xcarchive/Products/Applications/ManicEmu.app
          IPA_PATH: ${{ runner.temp }}/ManicEmuRelease.ipa
        run: |
          test -d "$APP_PATH"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/Payload" "$IPA_PATH"

      - name: 6. Store IPA as Workflow Artifact
        if: env.UPLOAD_IPA == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ManicEmu-Release.ipa
          path: ${{ runner.temp }}/ManicEmuRelease.ipa
          retention-days: 90
          if-no-files-found: error
