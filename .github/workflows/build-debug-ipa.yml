name: Build Debug IPA

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    env:
      UPLOAD_IPA: ${{ vars.UPLOAD_IPA || 'true' }}

    steps:
      - name: 1. Fetch Source Code
        uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - name: 2. Configure Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0.1"

      - name: 3. Compile Project Archive
        run: |
          xcodebuild clean archive \
            -project ManicEmu/ManicEmu.xcodeproj \
            -scheme "ManicEmuDebug" \
            -configuration Debug \
            -archivePath "$RUNNER_TEMP/ManicEmuDebug.xcarchive" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone"

      - name: 4. Package .app into .ipa
        env:
          APP_PATH: ${{ runner.temp }}/ManicEmuDebug.xcarchive/Products/Applications/ManicEmuDebug.app
          IPA_PATH: ${{ runner.temp }}/ManicEmuDebug.ipa
        run: |
          test -d "$APP_PATH"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/Payload" "$IPA_PATH"

      - name: 5. Store IPA as Workflow Artifact
        if: env.UPLOAD_IPA == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ManicEmu-Debug.ipa
          path: ${{ runner.temp }}/ManicEmuDebug.ipa
          retention-days: 90
          if-no-files-found: error
